<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MouseEngine-Mouse Group Edit</title>
    <link rel="stylesheet" href="css/mouseUI.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <div class="header-title">Mouse Group Edit</div>
            </div>
            <div class="header-right">
                <div class="header-btn" onclick="importGroup()">导入组</div>
                <div class="header-btn" onclick="createEmptyGroup()">新建组</div>
            </div>
        </div>
        
        <!-- 主内容 -->
        <div class="main-content">
            <div class="content-left">
                <div class="wallpaper-grid" id="previewGrid"></div>
            </div>
            
            <div class="content-right">


                <!-- 鼠标编辑器核心 -->
                <div class="mouse-editor-section">
                    <div class="editor-header">
                        <div class="editor-title" id="editorTitle">编辑鼠标组</div>
                        <button class="save-button" onclick="saveData()">保存当前组</button>
                    </div>

                    <div class="header-row" onclick="showDropdown()">
                        <div id="groupDropdown" class="dropdown-container"></div>
                    </div>

                    <div id="cursorList">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 组名输入悬浮窗 -->
    <div id="groupNameModal" class="modal-overlay">
        <div class="modal-content">
            <h3>新建鼠标组</h3>
            <input type="text" id="groupNameInput" placeholder="请输入组名" class="modal-input">
            <div class="modal-buttons">
                <button id="cancelBtn" class="modal-button cancel">取消</button>
                <button id="confirmBtn" class="modal-button confirm">确认</button>
            </div>
        </div>
    </div>

    <!-- 右键菜单 -->
    <div id="contextMenu" class="context-menu">
        <div id="renameGroupItem" class="context-menu-item">重命名</div>
        <div id="deleteGroupItem" class="context-menu-item">删除此组</div>
    </div>

    <!-- 输入框右键菜单 -->
    <div id="inputContextMenu" class="context-menu">
        <div id="clearInputItem" class="context-menu-item">清空</div>
    </div>

    <!-- 重命名弹窗 -->
    <div id="renameModal" class="modal-overlay">
        <div class="modal-content">
            <h3>重命名鼠标组</h3>
            <input type="text" id="renameInput" placeholder="请输入新组名" class="modal-input">
            <div class="modal-buttons">
                <button id="renameCancelBtn" class="modal-button cancel">取消</button>
                <button id="renameConfirmBtn" class="modal-button confirm">确认</button>
            </div>
        </div>
    </div>

    <script src="js/mouseUI.js"></script>
</body>
</html>
